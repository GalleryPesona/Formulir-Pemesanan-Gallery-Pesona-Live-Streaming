<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Pesona — Live Streaming Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAoAAAAKACAYAAAAMzckjAAA...">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#FFFFFF;
    --surface-alt:#EAF3FC;
    --line: rgba(30,64,143,0.14);
    --gold:#2563EB;
    --gold-soft:#1E4FBF;
    --ivory:#0F2A4A;
    --muted:#5C7A9C;
    --rose:#2563EB;
    --success:#1F7A54;
    --danger:#C0392B;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 20% -10%, #FFFFFF 0%, #F2F7FD 55%);
    color:var(--ivory);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
  }
  a{color:var(--gold-soft);}
  button{font-family:'Inter',sans-serif; cursor:pointer; border:none;}
  input, textarea, select{
    font-family:'Inter', sans-serif;
    background:var(--surface-alt);
    border:1px solid var(--line);
    color:var(--ivory);
    border-radius:10px;
    padding:11px 13px;
    font-size:14.5px;
    width:100%;
    outline:none;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--gold);}
  label{font-size:13px; color:var(--muted); margin-bottom:6px; display:block;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 22px; border-radius:10px; font-weight:600; font-size:14.5px;
    transition: transform .12s, box-shadow .12s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--gold); color:#FFFFFF;}
  .btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,0.35);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ivory);}
  .btn-ghost:hover{border-color:var(--gold);}
  .btn-danger{background:transparent; border:1px solid var(--danger); color:var(--danger);}
  .wrap{max-width:1080px; margin:0 auto; padding:32px 20px 80px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:28px;}

  /* ---------- Ticket / pass motif ---------- */
  .pass{
    position:relative;
    background:var(--surface);
    border-radius:var(--radius);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .pass::before{
    content:"";
    position:absolute; left:0; right:0; top:64px;
    height:0; border-top:2px dashed rgba(37,99,235,0.35);
  }
  .pass::after{
    content:"";
    position:absolute; left:-11px; top:53px; width:22px; height:22px;
    background:var(--bg); border-radius:50%;
    box-shadow: 1040px 0 0 var(--bg);
  }
  .pass-head{
    padding:18px 28px; display:flex; align-items:center; justify-content:space-between;
  }
  .pass-body{padding:34px 28px 28px;}

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1080px; margin:0 auto; padding:26px 20px 0;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-name{font-size:15px; letter-spacing:.02em;}
  .brand-name b{color:var(--gold-soft); font-weight:600;}

  /* ---------- Form page ---------- */
  .hero{padding:52px 0 30px; text-align:center;}
  .hero h1{font-size:clamp(30px,4vw,44px); line-height:1.15;}
  .hero p{color:var(--muted); max-width:480px; margin:14px auto 0; font-size:15px;}
  .form-grid{display:grid; gap:18px; margin-top:8px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:560px){.row2{grid-template-columns:1fr;}}
  .foot-note{font-size:12.5px; color:var(--muted); text-align:center; margin-top:18px;}

  .confirm-num{font-family:'JetBrains Mono',monospace; color:var(--gold-soft); font-size:13px;}
  .field-line{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:14.5px;}
  .field-line span:first-child{color:var(--muted);}

  /* ---------- Admin ---------- */
  .admin-shell{display:flex; min-height:100vh;}
  .side{
    width:220px; background:var(--surface); border-right:1px solid var(--line);
    padding:26px 16px; display:flex; flex-direction:column; gap:6px;
  }
  .side .brand{padding:0 8px 22px;}
  .navbtn{
    display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:9px;
    background:transparent; color:var(--muted); font-size:14px; text-align:left; width:100%;
  }
  .navbtn.active{background:var(--surface-alt); color:var(--gold-soft);}
  .navbtn:hover{color:var(--ivory);}
  .main{flex:1; padding:30px 34px; max-width:980px;}
  .main h2{font-size:24px; margin-bottom:4px;}
  .sub{color:var(--muted); font-size:13.5px; margin-bottom:26px;}

  /* Search Bar Style */
  .search-container {
    margin-bottom: 20px;
    position: relative;
  }
  .search-container input {
    padding-left: 40px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235C7A9C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'></circle><line x1='21' y1='21' x2='16.65' y2='16.65'></line></svg>");
    background-repeat: no-repeat;
    background-position: 14px center;
  }

  table{width:100%; border-collapse:collapse; font-size:14px;}
  th{text-align:left; color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; padding:10px 12px; border-bottom:1px solid var(--line);}
  td{padding:13px 12px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:hover td{background:rgba(42,36,48,0.035);}
  .tag{font-size:11px; padding:3px 9px; border-radius:20px; background:var(--surface-alt); color:var(--gold-soft); font-family:'JetBrains Mono',monospace;}

  .empty{color:var(--muted); font-size:14px; padding:30px 0; text-align:center; border:1px dashed var(--line); border-radius:10px;}

  .invoice-view{background:#fff; color:#1E1A22; border-radius:12px; padding:0; overflow:hidden;}
  .invoice-view .ihead{background:#0F2A4A; color:#EAF3FC; padding:22px 28px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .invoice-view .ibody{padding:28px;}
  .invoice-view table td, .invoice-view table th{border-color:#e6e1d8; color:#1E1A22;}
  .inv-badge{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.08em; padding:6px 14px; border-radius:20px; text-transform:uppercase; margin-left:auto;}
  .inv-label{width:140px; color:#6b6455;}
  .action-row{display:flex; gap:10px; flex-wrap:wrap;}
  .list-card{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; gap:12px; flex-wrap:wrap;}
  .inv-actions-mobile{display:none;}

  @media (max-width:800px){
    .admin-shell{flex-direction:column; min-height:auto;}
    .side{display:none;}
    .mobile-nav{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:14px 16px; border-bottom:1px solid var(--line); background:var(--surface);
      position:sticky; top:0; z-index:20;
    }
    .mobile-nav-brand{display:flex; align-items:center; gap:8px; font-size:13px; white-space:nowrap;}
    .mobile-nav-brand b{color:var(--gold-soft); font-weight:600;}
    .mobile-select{
      flex:1; max-width:220px; background:var(--surface-alt); color:var(--ivory);
      border:1px solid var(--line); border-radius:10px; padding:10px 12px;
      font-size:13.5px; font-family:inherit; appearance:none;
    }
    .main{padding:20px 14px; max-width:100%;}
    .main h2{font-size:19px;}
    .sub{margin-bottom:18px;}
    .row2{grid-template-columns:1fr;}
    table{font-size:12.5px;}
    th, td{padding:9px 8px;}
    
    /* Perbaikan responsif form edit data pemesanan agar tidak berantakan */
    .form-grid .row2 {
      grid-template-columns: 1fr !important;
      gap: 12px;
    }
  }
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--gold);
    padding:14px 18px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,.4);
    display:none; z-index:50; max-width:320px;
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ STATE MANAGEMENT ============ */
let bookings = [];
let currentView = 'form'; 
let editingBookingId = null;
let searchQuery = '';

// Load mock data awal
if (!localStorage.getItem('gp_bookings')) {
  bookings = [
    { id: "GP-76A1", nama: "Siti Aminah", tempat: "Gedung Sari Rasa", tanggal: "2026-08-15", jam: "09:00", wa: "628123456789", paket: "premium", status: "Lunas", harga: 3500000 },
    { id: "GP-92B2", nama: "Budi Santoso", tempat: "Hotel Nirwana", tanggal: "2026-09-20", jam: "19:00", wa: "628987654321", paket: "standard", status: "DP", harga: 2000000 }
  ];
  localStorage.setItem('gp_bookings', JSON.stringify(bookings));
} else {
  bookings = JSON.parse(localStorage.getItem('gp_bookings'));
}

function saveToStorage() {
  localStorage.setItem('gp_bookings', JSON.stringify(bookings));
}

function fmtIDR(n){ return "Rp " + Number(n||0).toLocaleString('id-ID'); }
function fmtDate(d){ if(!d) return "-"; const dt = new Date(d+"T00:00:00"); return dt.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 3200); }

/* ============ ROUTER / RENDERER ============ */
function render() {
  const app = document.getElementById('app');
  
  if (currentView === 'form') {
    app.innerHTML = renderFormView();
  } else {
    app.innerHTML = `
      <div class="admin-shell">
        <!-- Sidebar Desktop -->
        <div class="side">
          <div class="brand"><span class="brand-name"><b>Gallery Pesona</b> Admin</span></div>
          <button class="navbtn ${currentView==='dashboard'?'active':''}" onclick="changeView('dashboard')">Dashboard</button>
          <button class="navbtn ${currentView==='bookings'?'active':''}" onclick="changeView('bookings')">Data Pemesanan</button>
          <button class="navbtn ${currentView==='invoice'?'active':''}" onclick="changeView('invoice')">Invoice</button>
          <button class="navbtn" onclick="changeView('form')">Keluar ke Form</button>
        </div>
        
        <!-- Navigation Mobile -->
        <div class="mobile-nav">
          <div class="mobile-nav-brand"><b>GP</b> Admin</div>
          <select class="mobile-select" onchange="changeView(this.value)">
            <option value="dashboard" ${currentView==='dashboard'?'selected':''}>Dashboard</option>
            <option value="bookings" ${currentView==='bookings'?'selected':''}>Data Pemesanan</option>
            <option value="invoice" ${currentView==='invoice'?'selected':''}>Invoice</option>
            <option value="form">Keluar ke Form</option>
          </select>
        </div>

        <!-- Main Content -->
        <div class="main">
          ${renderMainContent()}
        </div>
      </div>
    `;
  }
}

function changeView(view) {
  currentView = view;
  searchQuery = ''; // Reset pencarian saat berpindah menu
  editingBookingId = null;
  render();
}

/* ============ VIEWS ============ */

// 1. TAMPILAN FORMULIR PELANGGAN
function renderFormView() {
  return `
    <div class="wrap" style="max-width: 650px;">
      <div class="hero">
        <span class="eyebrow">Booking Online</span>
        <h1>Gallery Pesona</h1>
        <p>Sistem Pemesanan Live Streaming Event Profesional & Terpercaya</p>
      </div>
      <div class="card">
        <form onsubmit="handleCustomerSubmit(event)">
          <div class="form-grid">
            <div>
              <label>Nama Lengkap</label>
              <input type="text" id="c_nama" required placeholder="Contoh: Risa & Andri">
            </div>
            <div>
              <label>Tempat / Lokasi Event</label>
              <input type="text" id="c_tempat" required placeholder="Contoh: Gedung Graha Sakti">
            </div>
            <div class="row2">
              <div>
                <label>Tanggal Event</label>
                <input type="date" id="c_tanggal" required>
              </div>
              <div>
                <label>Jam Event [source: 1]</label>
                <input type="time" id="c_jam" required>
              </div>
            </div>
            <div class="row2">
              <div>
                <label>Nomor WhatsApp</label>
                <input type="tel" id="c_wa" required placeholder="Contoh: 0812345678">
              </div>
              <div>
                <label>Pilihan Paket</label>
                <select id="c_paket" required>
                  <option value="standard">Standard (Rp 2.000.000)</option>
                  <option value="premium">Premium (Rp 3.500.000)</option>
                </select>
              </div>
            </div>
            <div style="margin-top: 10px;">
              <button type="submit" class="btn btn-primary" style="width:100%;">Kirim Pengajuan Pemesanan</button>
            </div>
          </div>
        </form>
      </div>
      <p class="foot-note">Ingin masuk ke halaman pengelolaan? <a href="#" onclick="changeView('dashboard')">Masuk Admin</a></p>
    </div>
  `;
}

// 2. KONTEN UTAMA ADMIN
function renderMainContent() {
  if (currentView === 'dashboard') {
    return `
      <h2>Dashboard Ringkasan</h2>
      <p class="sub">Informasi cepat mengenai status pesanan saat ini.</p>
      <div class="form-grid row2">
        <div class="card" style="background: var(--surface-alt);">
          <h3>${bookings.length} Total</h3>
          <p style="color: var(--muted); margin:0;">Jumlah Semua Pesanan</p>
        </div>
        <div class="card" style="background: #eafcee;">
          <h3>${bookings.filter(b => b.status === 'Lunas').length} Lunas</h3>
          <p style="color: var(--muted); margin:0;">Pesanan Sudah Selesai Pembayaran</p>
        </div>
      </div>
    `;
  }
  
  if (currentView === 'bookings') {
    if (editingBookingId) {
      return renderEditBookingForm();
    }
    
    // Filter data berdasarkan fitur pencarian
    const filteredBookings = bookings.filter(b => 
      b.nama.toLowerCase().includes(searchQuery.toLowerCase()) ||
      b.tempat.toLowerCase().includes(searchQuery.toLowerCase())
    );

    return `
      <h2>Data Pemesanan</h2>
      <p class="sub">Kelola jadwal dan data teknis seluruh pesanan klien.</p>
      
      <!-- Fitur Pencarian -->
      <div class="search-container">
        <input type="text" placeholder="Cari nama pelanggan atau tempat event..." value="${searchQuery}" oninput="handleSearch(this.value)">
      </div>

      <div class="card" style="padding:0; overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID & Nama</th>
              <th>Lokasi & Waktu [source: 1]</th>
              <th>Paket</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            ${filteredBookings.length === 0 ? `<tr><td colspan="5" class="empty">Tidak ada data pemesanan ditemukan</td></tr>` : 
              filteredBookings.map(b => `
              <tr>
                <td><span class="tag">${b.id}</span><br><b>${b.nama}</b><br><span style="font-size:12px; color:var(--muted)">WA: ${b.wa}</span></td>
                <td>${b.tempat}<br><small>${fmtDate(b.tanggal)} pukul ${b.jam} WIB</small></td>
                <td><span class="tag">${b.paket.toUpperCase()}</span><br>${fmtIDR(b.harga)}</td>
                <td><span class="tag" style="background:${b.status==='Lunas'?'#eafcee':'#fff3cd'}; color:${b.status==='Lunas'?'#1F7A54':'#a18103'}">${b.status}</span></td>
                <td>
                  <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px;" onclick="openEditBooking('${b.id}')">Edit</button>
                  <button class="btn btn-danger" style="padding:6px 12px; font-size:12px; margin-top:4px;" onclick="deleteBooking('${b.id}')">Hapus</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  if (currentView === 'invoice') {
    const filteredBookings = bookings.filter(b => 
      b.nama.toLowerCase().includes(searchQuery.toLowerCase()) ||
      b.tempat.toLowerCase().includes(searchQuery.toLowerCase())
    );

    return `
      <h2>Invoice & Penagihan</h2>
      <p class="sub">Pantau dan buat invoice tagihan resmi untuk dikirimkan ke pelanggan.</p>
      
      <!-- Fitur Pencarian -->
      <div class="search-container">
        <input type="text" placeholder="Cari nama pelanggan atau tempat event..." value="${searchQuery}" oninput="handleSearch(this.value)">
      </div>

      <div class="form-grid">
        ${filteredBookings.length === 0 ? `<div class="empty">Tidak ada invoice ditemukan</div>` : 
          filteredBookings.map(b => `
          <div class="card invoice-view" style="border: 1px solid var(--line);">
            <div class="ihead">
              <div>
                <span style="font-size:12px; opacity:0.8;">INVOICE ID</span>
                <h3 style="font-family:'JetBrains Mono',monospace; font-size:16px;">INV-${b.id}</h3>
              </div>
              <span class="inv-badge" style="background:${b.status==='Lunas'?'#1F7A54':'#2563EB'}; color:#fff;">${b.status}</span>
            </div>
            <div class="ibody">
              <div class="field-line"><span class="inv-label">Pelanggan</span><span><b>${b.nama}</b> (${b.wa})</span></div>
              <div class="field-line"><span class="inv-label">Detail Event [source: 1]</span><span>${b.tempat}<br><small>${fmtDate(b.tanggal)} @ ${b.jam} WIB</small></span></div>
              <div class="field-line"><span class="inv-label">Paket</span><span>${b.paket.toUpperCase()} - ${fmtIDR(b.harga)}</span></div>
              <div style="margin-top:20px;" class="action-row">
                <button class="btn btn-primary" onclick="shareWhatsApp('${b.id}')">Kirim via WhatsApp</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
}

// FORMULIR EDIT DATA PEMESANAN (SUDAH DI-REVISI RESPONSIF & RAPI DI MOBILE)
function renderEditBookingForm() {
  const target = bookings.find(b => b.id === editingBookingId);
  return `
    <h2>Edit Pemesanan <span class="tag">${target.id}</span></h2>
    <p class="sub">Sesuaikan kembali informasi detail acara pelanggan.</p>
    <div class="card">
      <form onsubmit="handleEditSubmit(event)">
        <div class="form-grid">
          <div>
            <label>Nama Lengkap</label>
            <input type="text" id="e_nama" value="${target.nama}" required>
          </div>
          <div>
            <label>Tempat / Lokasi Event</label>
            <input type="text" id="e_tempat" value="${target.tempat}" required>
          </div>
          <div class="row2">
            <div>
              <label>Tanggal Event</label>
              <input type="date" id="e_tanggal" value="${target.tanggal}" required>
            </div>
            <div>
              <label>Jam Event [source: 1]</label>
              <input type="time" id="e_jam" value="${target.jam || '00:00'}" required>
            </div>
          </div>
          <div class="row2">
            <div>
              <label>Nomor WhatsApp</label>
              <input type="tel" id="e_wa" value="${target.wa}" required>
            </div>
            <div>
              <label>Pilihan Paket</label>
              <select id="e_paket" required onchange="updatePriceEdit(this.value)">
                <option value="standard" ${target.paket==='standard'?'selected':''}>Standard</option>
                <option value="premium" ${target.paket==='premium'?'selected':''}>Premium</option>
              </select>
            </div>
          </div>
          <div class="row2">
            <div>
              <label>Total Harga (Rp)</label>
              <input type="number" id="e_harga" value="${target.harga}" required>
            </div>
            <div>
              <label>Status Pembayaran</label>
              <select id="e_status" required>
                <option value="DP" ${target.status==='DP'?'selected':''}>DP (Uang Muka)</option>
                <option value="Lunas" ${target.status==='Lunas'?'selected':''}>Lunas</option>
              </select>
            </div>
          </div>
          <div style="margin-top:16px; display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            <button type="button" class="btn btn-ghost" onclick="cancelEdit()">Batal</button>
          </div>
        </div>
      </form>
    </div>
  `;
}

/* ============ HANDLERS & LOGIC ============ */
function handleSearch(val) {
  searchQuery = val;
  render();
}

function handleCustomerSubmit(e) {
  e.preventDefault();
  const nama = document.getElementById('c_nama').value;
  const tempat = document.getElementById('c_tempat').value;
  const tanggal = document.getElementById('c_tanggal').value;
  const jam = document.getElementById('c_jam').value;
  const wa = document.getElementById('c_wa').value;
  const paket = document.getElementById('c_paket').value;
  
  const harga = paket === 'premium' ? 3500000 : 2000000;
  const id = "GP-" + Math.random().toString(36).substring(2, 6).toUpperCase();

  const newBooking = { id, nama, tempat, tanggal, jam, wa, paket, status: 'DP', harga };
  bookings.push(newBooking);
  saveToStorage();

  toast("Pemesanan Berhasil Dikirim!");
  e.target.reset();
}

function openEditBooking(id) {
  editingBookingId = id;
  render();
}

function cancelEdit() {
  editingBookingId = null;
  render();
}

function updatePriceEdit(val) {
  const priceInput = document.getElementById('e_harga');
  if(priceInput) {
    priceInput.value = val === 'premium' ? 3500000 : 2000000;
  }
}

function handleEditSubmit(e) {
  e.preventDefault();
  const idx = bookings.findIndex(b => b.id === editingBookingId);
  if(idx !== -1) {
    bookings[idx].nama = document.getElementById('e_nama').value;
    bookings[idx].tempat = document.getElementById('e_tempat').value;
    bookings[idx].tanggal = document.getElementById('e_tanggal').value;
    bookings[idx].jam = document.getElementById('e_jam').value;
    bookings[idx].wa = document.getElementById('e_wa').value;
    bookings[idx].paket = document.getElementById('e_paket').value;
    bookings[idx].harga = Number(document.getElementById('e_harga').value);
    bookings[idx].status = document.getElementById('e_status').value;
    
    saveToStorage();
    toast("Data pemesanan berhasil diperbarui!");
    editingBookingId = null;
    render();
  }
}

function deleteBooking(id) {
  if(confirm("Apakah Anda yakin ingin menghapus pemesanan ini?")) {
    bookings = bookings.filter(b => b.id !== id);
    saveToStorage();
    toast("Pemesanan dihapus.");
    render();
  }
}

function shareWhatsApp(id) {
  const b = bookings.find(item => item.id === id);
  if(!b) return;

  const teks = `Halo ${b.nama},\n\nBerikut adalah Invoice resmi dari *Gallery Pesona* untuk pesanan Anda:\n\n` +
               `• *Invoice ID:* INV-${b.id}\n` +
               `• *Lokasi Event:* ${b.tempat}\n` +
               `• *Waktu Event:* ${fmtDate(b.tanggal)} pada ${b.jam} WIB [source: 1]\n` +
               `• *Pilihan Paket:* ${b.paket.toUpperCase()}\n` +
               `• *Total Biaya:* ${fmtIDR(b.harga)}\n` +
               `• *Status:* ${b.status}\n\n` +
               `Terima kasih telah memercayakan dokumentasi event Anda kepada kami.`;

  window.open(`https://api.whatsapp.com/send?phone=${b.wa}&text=${encodeURIComponent(teks)}`, '_blank');
}

// Inisialisasi awal aplikasi
render();
</script>
</body>
</html>
