<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Pesona — Live Streaming Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAoAAAAKACAYAAAAMzckjAAA...">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#FFFFFF;
    --surface-alt:#EAF3FC;
    --line: rgba(30,64,143,0.14);
    --gold:#2563EB;
    --gold-soft:#1E4FBF;
    --ivory:#0F2A4A;
    --muted:#5C7A9C;
    --rose:#2563EB;
    --success:#1F7A54;
    --danger:#C0392B;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 20% -10%, #FFFFFF 0%, #F2F7FD 55%);
    color:var(--ivory);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
  }
  a{color:var(--gold-soft);}
  button{font-family:'Inter',sans-serif; cursor:pointer; border:none;}
  input, textarea, select{
    font-family:'Inter', sans-serif;
    background:var(--surface-alt);
    border:1px solid var(--line);
    color:var(--ivory);
    border-radius:10px;
    padding:11px 13px;
    font-size:14.5px;
    width:100%;
    outline:none;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--gold);}
  label{font-size:13px; color:var(--muted); margin-bottom:6px; display:block;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 22px; border-radius:10px; font-weight:600; font-size:14.5px;
    transition: transform .12s, box-shadow .12s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--gold); color:#FFFFFF;}
  .btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,0.35);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ivory);}
  .btn-ghost:hover{border-color:var(--gold);}
  .btn-danger{background:transparent; border:1px solid var(--danger); color:var(--danger);}
  .wrap{max-width:1080px; margin:0 auto; padding:32px 20px 80px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:28px;}

  /* ---------- Ticket / pass motif ---------- */
  .pass{
    position:relative;
    background:var(--surface);
    border-radius:var(--radius);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .pass::before{
    content:"";
    position:absolute; left:0; right:0; top:64px;
    height:0; border-top:2px dashed rgba(37,99,235,0.35);
  }
  .pass::after{
    content:"";
    position:absolute; left:-11px; top:53px; width:22px; height:22px;
    background:var(--bg); border-radius:50%;
    box-shadow: 1040px 0 0 var(--bg);
  }
  .pass-head{
    padding:18px 28px; display:flex; align-items:center; justify-content:space-between;
  }
  .pass-body{padding:34px 28px 28px;}

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1080px; margin:0 auto; padding:26px 20px 0;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-name{font-size:15px; letter-spacing:.02em;}
  .brand-name b{color:var(--gold-soft); font-weight:600;}

  /* ---------- Form page ---------- */
  .hero{padding:52px 0 30px; text-align:center;}
  .hero h1{font-size:clamp(30px,4vw,44px); line-height:1.15;}
  .hero p{color:var(--muted); max-width:480px; margin:14px auto 0; font-size:15px;}
  .form-grid{display:grid; gap:18px; margin-top:8px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:560px){.row2{grid-template-columns:1fr;}}
  .foot-note{font-size:12.5px; color:var(--muted); text-align:center; margin-top:18px;}

  .confirm-num{font-family:'JetBrains Mono',monospace; color:var(--gold-soft); font-size:13px;}
  .field-line{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:14.5px;}
  .field-line span:first-child{color:var(--muted);}

  /* ---------- Admin ---------- */
  .admin-shell{display:flex; min-height:100vh;}
  .side{
    width:220px; background:var(--surface); border-right:1px solid var(--line);
    padding:26px 16px; display:flex; flex-direction:column; gap:6px;
  }
