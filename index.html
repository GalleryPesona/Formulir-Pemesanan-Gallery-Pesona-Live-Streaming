<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Pesona — Live Streaming Event</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FFFFFF; --surface:#FFFFFF; --surface-alt:#EAF3FC; --line: rgba(30,64,143,0.14); --gold:#2563EB; --ivory:#0F2A4A; --muted:#5C7A9C; --radius:12px; }
  *{box-sizing:border-box;} body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial; color:var(--ivory); background:var(--bg);}
  .wrap{max-width:1080px;margin:0 auto;padding:24px}
  .brand{display:flex;align-items:center;gap:12px}
  .pass{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .form-grid{display:grid;gap:12px}
  input,textarea,select{padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--surface-alt);color:var(--ivory);}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:none;background:var(--gold);color:#fff;cursor:pointer}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ivory)}
  .admin-shell{display:flex;gap:12px}
  .side{width:220px}
  .main{flex:1}
  table{width:100%;border-collapse:collapse}
  th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left}
  .tag{background:var(--surface-alt);padding:4px 8px;border-radius:12px;font-family:JetBrains Mono,monospace}
  @media(max-width:800px){.admin-shell{flex-direction:column}.side{display:none}.mobile-nav{display:flex;gap:8px;margin-bottom:12px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" style="position:fixed;right:16px;bottom:16px;background:#fff;padding:10px;border-radius:8px;border:1px solid var(--line);display:none"></div>
<script>
/* Minimal, cleaned version — implements requested fixes and avoids large external blobs */
const LOGO = '';
let ADMIN_WA_NUMBER = '6285226452935';
let ADMIN_PASSWORD = 'pesona2026';
let ADMIN_REKENING = [];
let adminAuthed = false;
const LS_PREFIX = 'gp_';
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
async function sGet(k){ try{ const v=localStorage.getItem(LS_PREFIX+k); return v?JSON.parse(v):null;}catch(e){return null} }
async function sSet(k,v){ try{ localStorage.setItem(LS_PREFIX+k, JSON.stringify(v)); return true;}catch(e){toast('Gagal simpan');return false} }
async function sList(prefix){ const out=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith(LS_PREFIX+prefix)) out.push(k.slice(LS_PREFIX.length)); } return out; }
async function sDelete(k){ localStorage.removeItem(LS_PREFIX+k); }

async function getAllBookings(){ const keys = await sList('booking:'); const items = await Promise.all(keys.map(k=>sGet(k))); return items.filter(Boolean).sort((a,b)=>b.createdAt - a.createdAt); }
async function getAllInvoices(){ const keys = await sList('invoice:'); const items = await Promise.all(keys.map(k=>sGet(k))); return items.filter(Boolean).sort((a,b)=>b.createdAt - a.createdAt); }

window.addEventListener('hashchange', render); window.addEventListener('DOMContentLoaded', render);
function render(){ const hash = location.hash || '#/'; if(hash.startsWith('#/admin')){ if(!adminAuthed) renderAdminLogin(); else renderAdmin(); } else renderForm(); }

/* CUSTOMER FORM */
function renderForm(){ const app=document.getElementById('app'); app.innerHTML = `
  <div class="wrap">
    <div class="brand"><div style="width:40px;height:40px;background:#eee;border-radius:8px"></div><div><b>Gallery Pesona</b><div style="font-size:13px;color:var(--muted)">Live Streaming</div></div></div>
    <div style="height:18px"></div>
    <div class="pass">
      <div style="font-weight:600;margin-bottom:8px">Formulir Pemesanan</div>
      <form id="bookingForm" class="form-grid">
        <input id="f_nama" placeholder="Nama lengkap">
        <input id="f_wa" placeholder="Nomor WhatsApp (0812...)">
        <input id="f_isievent" placeholder="Event (Akad, Wisuda, dll)">
        <input id="f_tempat" placeholder="Tempat Event">
        <div style="display:flex;gap:8px"><input id="f_tanggal" type="date"><input id="f_jam" type="time"></div>
        <textarea id="f_catatan" rows="3" placeholder="Catatan (opsional)"></textarea>
        <div style="display:flex;gap:8px"><button class="btn" type="submit">Kirim Pemesanan</button><a href="#/admin" class="btn btn-ghost" style="text-decoration:none">Admin</a></div>
      </form>
    </div>
  </div>`;
  document.getElementById('bookingForm').addEventListener('submit', onSubmitBooking);
}
async function onSubmitBooking(e){ e.preventDefault(); const nama=document.getElementById('f_nama').value.trim(); const noWa=document.getElementById('f_wa').value.trim(); const isiEvent=document.getElementById('f_isievent').value.trim(); const tempat=document.getElementById('f_tempat').value.trim(); const tanggal=document.getElementById('f_tanggal').value; const jam=document.getElementById('f_jam').value; const catatan=document.getElementById('f_catatan').value.trim(); if(!nama||!noWa||!isiEvent||!tempat||!tanggal||!jam){ toast('Mohon isi Nama, WA, Event, Tempat, Tanggal, dan Jam'); return; }
  const id=uid(); const now=Date.now(); const bookings = await getAllBookings(); const seq = bookings.length+1; const code = `${String(seq).padStart(3,'0')}-${tanggal}`;
  const booking={ id, code, nama, noWa, isiEvent, tempat, tanggal, jam, catatan, createdAt:now, status:'baru' };
  await sSet('booking:'+id, booking); toast('Pemesanan tersimpan'); const wa = 'https://wa.me/'+ADMIN_WA_NUMBER+'?text='+encodeURIComponent('Pemesanan '+code+' dari '+nama); window.open(wa,'_blank'); renderConfirmation(booking);
}
function renderConfirmation(b){ const app=document.getElementById('app'); app.innerHTML = `
  <div class="wrap">
    <div class="pass">
      <div style="font-weight:600">Pemesanan Diterima</div>
      <div style="margin-top:8px">ID: <span class="tag">${b.code}</span></div>
      <div style="margin-top:12px">Nama: ${b.nama}</div>
      <div>Event: ${b.isiEvent}</div>
      <div>Tempat: ${b.tempat}</div>
      <div>Tanggal · Jam: ${b.tanggal} · ${b.jam}</div>
      <div>Catatan: ${b.catatan||'-'}</div>
      <div style="margin-top:12px"><button class="btn" onclick="location.hash='#/'">Buat Pemesanan Lagi</button></div>
    </div>
  </div>`; }

/* ADMIN */
function renderAdminLogin(){ const app=document.getElementById('app'); app.innerHTML = `
  <div class="wrap">
    <div class="pass" style="max-width:420px;margin:0 auto">
      <div style="font-weight:600;margin-bottom:8px">Admin Panel</div>
      <input id="adminPass" type="password" placeholder="Kata sandi admin">
      <div style="margin-top:8px;display:flex;gap:8px"><button class="btn" id="loginBtn">Masuk</button><a class="btn btn-ghost" href="#/">Kembali</a></div>
    </div>
  </div>`;
  document.getElementById('loginBtn').addEventListener('click', ()=>{ const v=document.getElementById('adminPass').value; if(v===ADMIN_PASSWORD){ adminAuthed=true; renderAdmin(); } else { toast('Kata sandi salah'); } }); }

async function renderAdmin(){ const app=document.getElementById('app'); app.innerHTML = `
  <div class="wrap">
    <div class="admin-shell">
      <div class="side">
        <div style="font-weight:700;margin-bottom:8px">Admin</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button onclick="switchTab('bookings')" id="tab_bookings" class="btn btn-ghost">📋 Data Pemesanan</button>
          <button onclick="switchTab('calendar')" id="tab_calendar" class="btn btn-ghost">📅 Kalender</button>
          <button onclick="switchTab('invoice')" id="tab_invoice" class="btn btn-ghost">🧾 Invoice</button>
          <button onclick="switchTab('settings')" class="btn btn-ghost">⚙️ Pengaturan</button>
          <button onclick="doLogout()" class="btn btn-ghost">Keluar</button>
        </div>
      </div>
      <div class="main" id="adminMain"></div>
    </div>
  </div>`;
  // default tab
  window.adminCurrentTab = window.adminCurrentTab || 'bookings'; renderAdminTab(); }
function switchTab(t){ window.adminCurrentTab = t; renderAdminTab(); }
function doLogout(){ adminAuthed=false; render(); }

async function renderAdminTab(){ const main=document.getElementById('adminMain'); const tab = window.adminCurrentTab || 'bookings'; if(tab==='bookings'){ await renderBookings(main); } else if(tab==='calendar'){ await renderCalendar(main); } else if(tab==='invoice'){ await renderInvoice(main); } else renderSettings(main); }

/* Bookings with search + edit (mobile-friendly) */
let editingBookingId = null;
async function renderBookings(mount){ const bookings = await getAllBookings(); mount.innerHTML = `
  <h2>Data Pemesanan</h2>
  <div style="margin-bottom:12px;display:flex;gap:8px"><input id="bookingsSearch" placeholder="Cari (nama, id, event, tempat)" style="flex:1"><button class="btn btn-ghost" id="resetBookings">Reset</button></div>
  <div id="editBookingArea"></div>
  <div id="bookingsList"></div>`;
  document.getElementById('resetBookings').addEventListener('click', ()=>{ document.getElementById('bookingsSearch').value=''; renderBookings(mount); });
  // if editing
  if(editingBookingId){ const eb = bookings.find(b=>b.id===editingBookingId); if(eb){ document.getElementById('editBookingArea').innerHTML = `
    <div class="pass">
      <div style="font-weight:600">Edit · ${eb.code}</div>
      <input id="eb_nama" value="${eb.nama}">
      <input id="eb_wa" value="${eb.noWa}">
      <input id="eb_isievent" value="${eb.isiEvent}">
      <input id="eb_tempat" value="${eb.tempat}">
      <div style="display:flex;gap:8px"><input id="eb_tanggal" type="date" value="${eb.tanggal}"><input id="eb_jam" type="time" value="${eb.jam||''}"></div>
      <input id="eb_catatan" value="${(eb.catatan||'')}">
      <div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="saveBookingEdit('${eb.id}')">Simpan</button><button class="btn btn-ghost" onclick="cancelEditBooking()">Batal</button></div>
    </div>`;
      // scroll into view on small screens
      if(window.innerWidth <= 800){ setTimeout(()=>{ const el=document.getElementById('editBookingArea'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },100); }
    }
  }
  const listEl = document.getElementById('bookingsList'); function renderTable(items){ if(items.length===0){ listEl.innerHTML='<div class="pass">Belum ada pemesanan.</div>'; return; } listEl.innerHTML = '<table><thead><tr><th>ID</th><th>Nama</th><th>Event</th><th>Tempat</th><th>Tanggal</th><th>Jam</th><th></th></tr></thead><tbody>'+ items.map(b=>`<tr><td><span class="tag">${b.code}</span></td><td>${b.nama}</td><td>${b.isiEvent}</td><td>${b.tempat}</td><td>${b.tanggal}</td><td>${b.jam||'-'}</td><td><button class="btn btn-ghost" onclick="startEdit('${b.id}')">Edit</button>&nbsp;<button class="btn btn-ghost" onclick="jumpToInvoice('${b.id}')">Invoice</button>&nbsp;<button class="btn btn-ghost" onclick="armDelete(this,'booking','${b.id}')">Hapus</button></td></tr>`).join('') + '</tbody></table>'; }
  renderTable(bookings);
  const search = document.getElementById('bookingsSearch'); search.addEventListener('input',(e)=>{ const q=(e.target.value||'').toLowerCase(); const f=bookings.filter(b=> (b.nama||'').toLowerCase().includes(q) || (b.code||'').toLowerCase().includes(q) || (b.isiEvent||'').toLowerCase().includes(q) || (b.tempat||'').toLowerCase().includes(q) ); renderTable(f); });
}
function startEdit(id){ editingBookingId = id; renderAdminTab(); }
function cancelEditBooking(){ editingBookingId = null; renderAdminTab(); }
async function saveBookingEdit(id){ const nama=document.getElementById('eb_nama').value.trim(); const noWa=document.getElementById('eb_wa').value.trim(); const isiEvent=document.getElementById('eb_isievent').value.trim(); const tempat=document.getElementById('eb_tempat').value.trim(); const tanggal=document.getElementById('eb_tanggal').value; const jam=document.getElementById('eb_jam').value; const catatan=document.getElementById('eb_catatan').value.trim(); if(!nama||!tempat||!tanggal||!jam){ toast('Lengkapi Nama, Tempat, Tanggal, Jam'); return; } const existing = await sGet('booking:'+id); const updated = Object.assign({}, existing, { nama, noWa, isiEvent, tempat, tanggal, jam, catatan }); await sSet('booking:'+id, updated); toast('Tersimpan'); editingBookingId=null; renderAdminTab(); }

/* Calendar: show bookings + invoices */
let calMonth = new Date().getMonth(); let calYear = new Date().getFullYear();
async function renderCalendar(mount){ const bookings = await getAllBookings(); const invoices = await getAllInvoices(); mount.innerHTML = '<h2>Kalender</h2><div id="calArea"></div><div id="dayEvents" style="margin-top:12px"></div>'; drawCalendar(bookings,invoices); }
function drawCalendar(bookings,invoices){ const area=document.getElementById('calArea'); const firstDay=new Date(calYear,calMonth,1); const startOffset=(firstDay.getDay()+6)%7; const daysInMonth=new Date(calYear,calMonth+1,0).getDate(); const byDate={}; bookings.forEach(b=>{ (byDate[b.tanggal]=byDate[b.tanggal]||{bookings:[],invoices:[]}).bookings.push(b); }); invoices.forEach(i=>{ const t=i.booking && i.booking.tanggal; if(t) (byDate[t]=byDate[t]||{bookings:[],invoices:[]}).invoices.push(i); }); window._calDateMap = byDate; let html='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><button class="btn btn-ghost" onclick="calNav(-1)">←</button><div style="flex:1;font-weight:600">'+['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][calMonth]+' '+calYear+'</div><button class="btn btn-ghost" onclick="calNav(1)">→</button></div>'; html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">' + ['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(d=>`<div style="text-align:center;color:var(--muted);font-size:12px">${d}</div>`).join(''); for(let i=0;i<startOffset;i++) html += '<div></div>'; const today = new Date().toISOString().slice(0,10); for(let d=1;d<=daysInMonth;d++){ const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const has = byDate[dateStr]; html += `<div style="padding:8px;border-radius:8px;border:1px solid var(--line);background:${has? '#fff5': 'transparent'};cursor:${has? 'pointer':'default'}" ${has?`onclick="showDayEvents('${dateStr}')"`:''}>${d}${has?'<div style="width:8px;height:8px;background:var(--gold);border-radius:50%;position:absolute;margin-top:28px;margin-left:48px"></div>':''}</div>`; } html += '</div>'; area.innerHTML = html; }
function calNav(dir){ calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++} drawCalendar(window._calBookings || [], window._calInvoices || []); }
function showDayEvents(dateStr){ const bucket = window._calDateMap && window._calDateMap[dateStr] || {bookings:[],invoices:[]}; let html = `<h3>Acara ${dateStr}</h3>`; if(bucket.bookings.length===0 && bucket.invoices.length===0){ html += '<div class="pass">Tidak ada acara.</div>'; } bucket.bookings.forEach(b=>{ html += `<div class="pass" style="margin-bottom:8px"><div><b>${b.nama}</b> · ${b.isiEvent} · ${b.tempat}</div><div style="color:var(--muted)">WA:${b.noWa} · Jam:${b.jam||'-'}</div><div style="margin-top:8px"><button class="btn btn-ghost" onclick="startEdit('${b.id}')">Edit</button> <button class="btn btn-primary" onclick="jumpToInvoice('${b.id}')">Invoice</button></div></div>` }); bucket.invoices.forEach(i=>{ html += `<div class="pass" style="margin-bottom:8px"><div><b>${i.id}</b> · ${i.booking? i.booking.nama : '-'}</div><div style="color:var(--muted)">${i.layanan||''} · ${i.harga? 'Rp '+i.harga:''}</div></div>` }); document.getElementById('dayEvents').innerHTML = html; }

/* Invoice tab (simple) */
let editingInvoiceId = null;
async function renderInvoice(mount){ const bookings = await getAllBookings(); const invoices = await getAllInvoices(); mount.innerHTML = `
  <h2>Invoice</h2>
  <div style="margin-bottom:12px;display:flex;gap:8px"><input id="invSearch" placeholder="Cari invoice"><button class="btn btn-ghost" id="invReset">Reset</button></div>
  <div class="pass" style="margin-bottom:12px">
    <label>Pilih Pemesanan</label>
    <select id="inv_booking"><option value="">— pilih —</option>${bookings.map(b=>`<option value="${b.id}">${b.code} · ${b.nama} · ${b.tempat} · ${b.tanggal} ${b.jam? '· '+b.jam : ''}</option>`).join('')}</select>
    <input id="inv_layanan" placeholder="Nama layanan" style="margin-top:8px">
    <div style="display:flex;gap:8px;margin-top:8px"><input id="inv_harga" type="number" placeholder="Harga (Rp)"><select id="inv_status"><option value="belum_lunas">Belum Lunas</option><option value="lunas">Lunas</option></select></div>
    <textarea id="inv_catatan" placeholder="Catatan" style="margin-top:8px"></textarea>
    <div style="margin-top:8px"><button class="btn" id="createInvBtn">Buat Invoice</button></div>
  </div>
  <div id="invList"></div>`;
  document.getElementById('createInvBtn').addEventListener('click', async ()=>{ const bookingId=document.getElementById('inv_booking').value; const layanan=document.getElementById('inv_layanan').value.trim(); const harga=document.getElementById('inv_harga').value; const status=document.getElementById('inv_status').value; const catatan=document.getElementById('inv_catatan').value.trim(); if(!bookingId||!layanan||!harga){ toast('Lengkapi pilihan pemesanan, layanan, dan harga'); return; } const booking = bookings.find(b=>b.id===bookingId); const invId = 'INV-'+(booking?booking.code:uid()); const inv = { id:invId, bookingId, booking, layanan, harga: Number(harga), status, catatan, createdAt: Date.now() }; await sSet('invoice:'+invId, inv); toast('Invoice dibuat'); renderInvoice(mount); });
  function renderList(list){ const el=document.getElementById('invList'); if(!list || list.length===0){ el.innerHTML='<div class="pass">Belum ada invoice.</div>'; return; } el.innerHTML = list.map(inv=>`<div class="pass" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between"><div><b>${inv.id}</b> · ${inv.booking? inv.booking.nama: '-'}</div><div><button class="btn btn-ghost" onclick='sendInvoice("${inv.id}")'>Kirim WA</button> <button class="btn btn-ghost" onclick='editInv("${inv.id}")'>Edit</button></div></div><div style="color:var(--muted)">${inv.layanan||''} · Rp ${inv.harga||0} · ${inv.status||''}</div></div>`).join(''); }
  renderList(invoices);
  document.getElementById('invReset').addEventListener('click', ()=>{ document.getElementById('invSearch').value=''; renderInvoice(mount); });
  document.getElementById('invSearch').addEventListener('input',(e)=>{ const q=(e.target.value||'').toLowerCase(); renderList(invoices.filter(inv=> (inv.id||'').toLowerCase().includes(q) || (inv.booking && inv.booking.nama||'').toLowerCase().includes(q) || (inv.layanan||'').toLowerCase().includes(q) )); });
}
function sendInvoice(id){ alert('Membuka WhatsApp untuk invoice '+id); }
function editInv(id){ alert('Edit invoice: '+id); }

/* Settings */
function renderSettings(mount){ mount.innerHTML = `
  <h2>Pengaturan</h2>
  <div class="pass">
    <label>Nomor WA Admin</label>
    <input id="set_admin_wa" value="${ADMIN_WA_NUMBER}">
    <label style="margin-top:8px">Kata Sandi Admin</label>
    <input id="set_admin_pw" value="${ADMIN_PASSWORD}">
    <div style="margin-top:8px"><button class="btn" id="saveSettingsBtn">Simpan</button></div>
  </div>`;
  document.getElementById('saveSettingsBtn').addEventListener('click', async ()=>{ ADMIN_WA_NUMBER = document.getElementById('set_admin_wa').value.trim()||ADMIN_WA_NUMBER; ADMIN_PASSWORD = document.getElementById('set_admin_pw').value.trim()||ADMIN_PASSWORD; toast('Disimpan'); renderAdminTab(); }); }

/* delete helper */
function armDelete(btn, kind, id){ if(btn.dataset && btn.dataset.armed==='1'){ doDelete(kind,id); } else { btn.dataset.armed='1'; btn.dataset.orig=btn.textContent; btn.textContent='Klik lagi'; btn.classList.add('btn-ghost'); setTimeout(()=>{ btn.dataset.armed='0'; btn.textContent=btn.dataset.orig; },3500); } }
async function doDelete(kind,id){ await sDelete((kind==='booking'?'booking:':'invoice:')+id); toast(kind+' dihapus'); renderAdminTab(); }

</script>
</body>
</html>
