  body{
    background: radial-gradient(circle at 20% -10%, #FFFFFF 0%, #F2F7FD 55%);
    color:var(--ivory);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
  }
  a{color:var(--gold-soft);}
  button{font-family:'Inter',sans-serif; cursor:pointer; border:none;}
  input, textarea, select{
    font-family:'Inter', sans-serif;
    background:var(--surface-alt);
    border:1px solid var(--line);
    color:var(--ivory);
    border-radius:10px;
    padding:11px 13px;
    font-size:14.5px;
    width:100%;
    outline:none;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--gold);}
  label{font-size:13px; color:var(--muted); margin-bottom:6px; display:block;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 22px; border-radius:10px; font-weight:600; font-size:14.5px;
    transition: transform .12s, box-shadow .12s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--gold); color:#FFFFFF;}
  .btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,0.35);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ivory);}
  .btn-ghost:hover{border-color:var(--gold);}
  .btn-danger{background:transparent; border:1px solid var(--danger); color:var(--danger);}
  .wrap{max-width:1080px; margin:0 auto; padding:32px 20px 80px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:28px;}

  /* ---------- Ticket / pass motif (signature element) ---------- */
  .pass{
    position:relative;
    background:var(--surface);
    border-radius:var(--radius);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .pass::before{
    content:"";
    position:absolute; left:0; right:0; top:64px;
    height:0; border-top:2px dashed rgba(37,99,235,0.35);
  }
  .pass::after{
    content:"";
    position:absolute; left:-11px; top:53px; width:22px; height:22px;
    background:var(--bg); border-radius:50%;
    box-shadow: 1040px 0 0 var(--bg);
  }
  .pass-head{
    padding:18px 28px; display:flex; align-items:center; justify-content:space-between;
  }
  .pass-body{padding:34px 28px 28px;}

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1080px; margin:0 auto; padding:26px 20px 0;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .mark{
    width:40px; height:40px; border-radius:10px;
    object-fit:contain; display:block; background:transparent;
  }
  .brand-name{font-size:15px; letter-spacing:.02em;}
  .brand-name b{color:var(--gold-soft); font-weight:600;}

  /* ---------- Form page ---------- */
  .hero{padding:52px 0 30px; text-align:center;}
  .hero h1{font-size:clamp(30px,4vw,44px); line-height:1.15;}
  .hero p{color:var(--muted); max-width:480px; margin:14px auto 0; font-size:15px;}
  .form-grid{display:grid; gap:18px; margin-top:8px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:560px){.row2{grid-template-columns:1fr;}}
  .foot-note{font-size:12.5px; color:var(--muted); text-align:center; margin-top:18px;}

  .confirm-num{font-family:'JetBrains Mono',monospace; color:var(--gold-soft); font-size:13px;}
  .field-line{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:14.5px;}
  .field-line span:first-child{color:var(--muted);}

  /* ---------- Admin ---------- */
  .admin-shell{display:flex; min-height:100vh;}
  .side{
    width:220px; background:var(--surface); border-right:1px solid var(--line);
    padding:26px 16px; display:flex; flex-direction:column; gap:6px;
  }
  .side .brand{padding:0 8px 22px;}
  .navbtn{
    display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:9px;
    background:transparent; color:var(--muted); font-size:14px; text-align:left; width:100%;
  }
  .navbtn.active{background:var(--surface-alt); color:var(--gold-soft);}
  .navbtn:hover{color:var(--ivory);}
  .main{flex:1; padding:30px 34px; max-width:980px;}
  .main h2{font-size:24px; margin-bottom:4px;}
  .sub{color:var(--muted); font-size:13.5px; margin-bottom:26px;}

  table{width:100%; border-collapse:collapse; font-size:14px;}
  th{text-align:left; color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; padding:10px 12px; border-bottom:1px solid var(--line);}
  td{padding:13px 12px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:hover td{background:rgba(42,36,48,0.035);}
  .tag{font-size:11px; padding:3px 9px; border-radius:20px; background:var(--surface-alt); color:var(--gold-soft); font-family:'JetBrains Mono',monospace;}

  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .cal-dow{font-size:11px; text-align:center; color:var(--muted); padding-bottom:6px; text-transform:uppercase;}
  .cal-cell{
    aspect-ratio:1; border-radius:9px; border:1px solid var(--line); background:var(--surface-alt);
    padding:7px; font-size:13px; position:relative; cursor:default; color:var(--muted);
  }
  .cal-cell.inmonth{color:var(--ivory);}
  .cal-cell.has-event{border-color:var(--gold); cursor:pointer;}
  .cal-cell .dot{position:absolute; bottom:7px; right:7px; width:7px; height:7px; border-radius:50%; background:var(--gold);}
  .cal-cell.today{box-shadow: inset 0 0 0 1.5px var(--gold-soft);}

  .empty{color:var(--muted); font-size:14px; padding:30px 0; text-align:center; border:1px dashed var(--line); border-radius:10px;}

  .login-wrap{display:flex; align-items:center; justify-content:center; min-height:100vh;}
  .qris-preview{width:150px; border-radius:10px; border:1px solid var(--line); margin-top:10px;}
  .invoice-view{background:#fff; color:#1E1A22; border-radius:12px; padding:0; overflow:hidden;}
  .invoice-view .ihead{background:#0F2A4A; color:#EAF3FC; padding:22px 28px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .invoice-view .ibody{padding:28px;}
  .invoice-view table td, .invoice-view table th{border-color:#e6e1d8; color:#1E1A22;}
  .inv-badge{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.08em; padding:6px 14px; border-radius:20px; text-transform:uppercase; margin-left:auto;}
  .inv-label{width:140px; color:#6b6455;}
  .action-row{display:flex; gap:10px; flex-wrap:wrap;}
  .list-card{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; gap:12px; flex-wrap:wrap;}
  .inv-actions-mobile{display:none;}
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px;}
  .stat-card .stat-label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;}
  .stat-card .stat-value{font-size:23px; font-weight:700; color:var(--ivory); font-family:'JetBrains Mono',monospace;}
  .stat-card.masuk .stat-value{color:var(--success);}
  .stat-card.keluar .stat-value{color:var(--danger);}
  .stat-card.saldo .stat-value{color:var(--gold-soft);}
  .kas-badge{font-size:11px; padding:3px 9px; border-radius:20px; font-family:'JetBrains Mono',monospace; font-weight:700;}
  .kas-badge.masuk{background:rgba(31,122,84,0.14); color:var(--success);}
  .kas-badge.keluar{background:rgba(192,57,43,0.12); color:var(--danger);}
  .kas-badge.auto{background:var(--surface-alt); color:var(--gold-soft); margin-left:6px;}
  @media (max-width:800px){
    .invoice-view .ihead{padding:16px; gap:10px;}
    .invoice-view .ibody{padding:16px;}
    .invoice-view table{font-size:12.5px;}
    .inv-badge{margin-left:0;}
    .inv-label{width:auto; min-width:100px;}
    .action-row{flex-direction:column;}
    .action-row .btn{width:100%;}
    .list-card{flex-direction:column; align-items:stretch;}
    .inv-actions-desktop{display:none;}
    .inv-actions-mobile{
      display:block; width:100%; background:var(--surface-alt); color:var(--ivory);
      border:1px solid var(--line); border-radius:10px; padding:11px 12px;
      font-size:13.5px; font-family:inherit; appearance:none; -webkit-appearance:none;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23C9A34E' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat:no-repeat; background-position:right 12px center; padding-right:34px;
    }
    .inv-actions-mobile:focus{outline:none; border-color:var(--gold);}
  }
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--gold);
    padding:14px 18px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,.4);
    display:none; z-index:50; max-width:320px;
  }
  ::selection{background:var(--gold); color:#FFFFFF;}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:42px;}
  .pw-toggle{
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    background:transparent; border:none; cursor:pointer; padding:8px;
    font-size:16px; line-height:1; color:var(--muted);
  }
  .pw-toggle:hover{color:var(--gold);}
  .mobile-nav{display:none;}
  @media (max-width:800px){
    .admin-shell{flex-direction:column; min-height:auto;}
    .side{display:none;}
    .mobile-nav{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:14px 16px; border-bottom:1px solid var(--line); background:var(--surface);
      position:sticky; top:0; z-index:20;
    }
    .mobile-nav-brand{display:flex; align-items:center; gap:8px; font-size:13px; white-space:nowrap;}
    .mobile-nav-brand .mark{width:28px; height:28px; border-radius:8px; object-fit:contain;}
    .mobile-nav-brand b{color:var(--gold-soft); font-weight:600;}
    .mobile-select{
      flex:1; max-width:220px; background:var(--surface-alt); color:var(--ivory);
      border:1px solid var(--line); border-radius:10px; padding:10px 12px;
      font-size:13.5px; font-family:inherit; appearance:none; -webkit-appearance:none;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23C9A34E' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat:no-repeat; background-position:right 10px center; padding-right:30px;
    }
    .mobile-select:focus{outline:none; border-color:var(--gold);}
    .main{padding:20px 14px; max-width:100%;}
    .main h2{font-size:19px;}
    .sub{margin-bottom:18px;}
    .row2{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr;}
    table{font-size:12.5px;}
    th, td{padding:9px 8px;}
  }
  @media (max-width:480px){
    .main{padding:14px 10px;}
    .mobile-select{max-width:170px; font-size:12.5px;}
    table{font-size:11.5px;}
    th, td{padding:7px 6px;}
    .card{padding:18px;}
  }
  #mainArea{overflow-x:auto;}
</style>

function formatWaDisplay(num){
  const digits = String(num || '').replace(/\D/g,'');
  if(!digits) return '';
  const rest = digits.startsWith('62') ? digits.slice(2) : (digits.startsWith('0') ? digits.slice(1) : digits);
  const groups = [];
  const pattern = [3,4,4,4];
  let i = 0, p = 0;
  while(i < rest.length){
    const len = pattern[p] || 4;
    groups.push(rest.slice(i, i+len));
    i += len; p++;
  }
  return '+62 ' + groups.join('-');
}

/* ============ STORAGE HELPERS (shared, terlihat oleh siapa pun yang punya tautan ini) ============ */
const STORAGE_AVAILABLE = (typeof window.storage !== 'undefined' && window.storage !== null);
const LS_PREFIX = 'gp_'; // fallback lokal (localStorage) jika window.storage tidak tersedia

function lsListKeys(prefix){
  const out = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(LS_PREFIX + prefix)) out.push(k.slice(LS_PREFIX.length));
  }
  return out;
}
async function sGet(key){
  if(STORAGE_AVAILABLE){
    try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
    catch(e){ console.warn('storage.get gagal, fallback localStorage', e); }
  }
  try{ const raw = localStorage.getItem(LS_PREFIX+key); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
}
async function sSet(key, val){
  if(STORAGE_AVAILABLE){
    try{ return await window.storage.set(key, JSON.stringify(val), true); }
    catch(e){ console.warn('storage.set gagal, fallback localStorage', e); }
  }
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); return {key, value:val}; }
  catch(e){ console.error('Gagal menyimpan data', e); toast('Gagal menyimpan data pemesanan. Coba muat ulang halaman.'); return null; }
}
async function sList(prefix){
  if(STORAGE_AVAILABLE){
    try{ const r = await window.storage.list(prefix, true); return r ? r.keys : []; }
    catch(e){ console.warn('storage.list gagal, fallback localStorage', e); }
  }
  return lsListKeys(prefix);
}
async function sDelete(key){
  if(STORAGE_AVAILABLE){
    try{ return await window.storage.delete(key, true); }
    catch(e){ console.warn('storage.delete gagal, fallback localStorage', e); }
  }
  try{ localStorage.removeItem(LS_PREFIX+key); return {deleted:true}; }catch(e){ return null; }
}

function fmtIDR(n){ return "Rp " + Number(n||0).toLocaleString('id-ID'); }

/* ---- Kirim Invoice ke WhatsApp Pelanggan ---- */
const INVOICE_CACHE = {};
function cacheInvoice(inv){ if(inv && inv.id) INVOICE_CACHE[inv.id] = inv; return inv; }
function normalizeWaNumber(raw){
  let digits = (raw||'').replace(/[^0-9]/g,'');
  if(!digits) return '';
  if(digits.startsWith('0')) digits = '62' + digits.slice(1);
  else if(!digits.startsWith('62')) digits = '62' + digits;
  return digits;
}
function buildInvoiceWaPlainText(inv){
  const b = inv.booking || {};
  const rekLines = (inv.rekening && inv.rekening.length)
    ? inv.rekening.map(r=>`• ${r.bank}: ${r.noRek}${r.atasNama ? ' a.n. '+r.atasNama : ''}`).join('\n')
    : '-';
  return `*Invoice Gallery Pesona*\n\n`+
    `No. Invoice: ${inv.id}\n`+
    `Nama: ${b.nama || '-'}\n`+
    `Tempat Event: ${b.tempat || '-'}\n`+
    `Tanggal Event: ${fmtDate(b.tanggal)}\n`+
    `Jam Event: ${b.jamEvent || '-'}\n`+
    `Total Tagihan: ${fmtIDR(inv.harga)}\n`+
    `Status Pembayaran: ${inv.status==='lunas' ? 'LUNAS' : 'BELUM LUNAS'}\n`+
    (inv.catatan ? `Catatan: ${inv.catatan}\n` : '')+
    `\nRekening Pembayaran:\n${rekLines}\n\n`+
    (inv.status==='lunas' ? `Terima kasih, pembayaran sudah kami terima 🙏` : `Mohon melakukan pembayaran sesuai rekening di atas dan kirim bukti transfer ke sini. Terima kasih 🙏`)+
    `\n\n(Invoice PDF terlampir)`;
}

async function generateInvoicePdfBlob(inv){
  if(typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined'){
    throw new Error('Library pembuat PDF belum siap dimuat.');
  }
  const wrapper = document.createElement('div');
  wrapper.style.position = 'fixed';
  wrapper.style.left = '-9999px';
  wrapper.style.top = '0';
  wrapper.style.width = '720px';
  wrapper.style.background = '#ffffff';
  wrapper.innerHTML = buildInvoiceViewHtml(inv);
  document.body.appendChild(wrapper);
  try{
    const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pageWidthMm = 210;
    const pageHeightMm = (canvas.height / canvas.width) * pageWidthMm;
    const pdf = new jsPDF({ unit: 'mm', format: [pageWidthMm, pageHeightMm] });
    pdf.addImage(imgData, 'PNG', 0, 0, pageWidthMm, pageHeightMm);
    return pdf.output('blob');
  } finally {
    wrapper.remove();
  }
}

async function sendInvoiceToCustomer(id){
  const inv = INVOICE_CACHE[id];
  if(!inv){ toast('Data invoice tidak ditemukan, coba muat ulang halaman.'); return; }
  const b = inv.booking || {};
  const waNumber = normalizeWaNumber(b.noWa);
  if(!waNumber){ toast('Nomor WhatsApp pelanggan tidak tersedia pada data pemesanan ini.'); return; }

  const btn = document.getElementById('waSendBtn_'+id);
  const btnOrigText = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = 'Menyiapkan PDF…'; }
  toast('Menyiapkan file PDF invoice…');

  let pdfBlob = null;
  try{ pdfBlob = await generateInvoicePdfBlob(inv); }
  catch(err){ console.warn('Gagal membuat PDF invoice', err); }

  if(btn){ btn.disabled = false; btn.textContent = btnOrigText; }

  const fileName = `${inv.id}.pdf`;
  const plainText = buildInvoiceWaPlainText(inv);

  if(pdfBlob && navigator.canShare && navigator.share){
    try{
      const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
      if(navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], text: plainText, title: `Invoice ${inv.id}` });
        toast('Pilih WhatsApp pada menu Bagikan untuk mengirim invoice ke pelanggan.');
        return;
      }
    }catch(err){
      if(err && err.name === 'AbortError'){ toast('Pengiriman dibatalkan.'); return; }
      console.warn('Web Share gagal, fallback ke unduh manual', err);
    }
  }

  if(pdfBlob){
    try{
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
    }catch(err){ console.warn('Gagal mengunduh PDF', err); }
  }

  const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(plainText)}`;
  let win = null;
  try{ win = window.open(waUrl, '_blank'); }catch(err){ console.warn('window.open diblokir', err); }
  const holder = document.getElementById('waFallback_'+id);
  if(!win || win.closed){
    toast('Popup diblokir. Klik tombol "Buka WhatsApp Pelanggan" di bawah, lalu lampirkan PDF yang sudah terunduh.');
    if(holder) holder.innerHTML = `<button class="btn btn-primary" style="margin-top:10px;" onclick="window.open('${waUrl}','_blank')">Buka WhatsApp Pelanggan</button>`;
  } else {
    toast(pdfBlob ? 'PDF invoice terunduh & WhatsApp dibuka — lampirkan file PDF secara manual di chat.' : 'WhatsApp dibuka (PDF gagal dibuat, teks saja terkirim).');
    if(holder) holder.innerHTML = pdfBlob ? `<p class="foot-note" style="text-align:left; margin-top:8px;">PDF (${fileName}) sudah terunduh ke perangkat — lampirkan file itu di chat WhatsApp yang baru terbuka.</p>` : '';
  }
}

async function getAllBookings(){
  const keys = await sList('booking:');
  const items = await Promise.all(keys.map(k => sGet(k)));
  return items.filter(Boolean).sort((a,b)=> b.createdAt - a.createdAt);
}
async function getAllInvoices(){
  const keys = await sList('invoice:');
  const items = await Promise.all(keys.map(k => sGet(k)));
  return items.filter(Boolean).sort((a,b)=> b.createdAt - a.createdAt).map(cacheInvoice);
}
async function getAllKas(){
  const keys = await sList('kas:');
  const items = await Promise.all(keys.map(k => sGet(k)));
  return items.filter(Boolean).sort((a,b)=> (b.tanggal||'').localeCompare(a.tanggal||'') || b.createdAt - a.createdAt);
}
/* Menyinkronkan transaksi kas otomatis dari status invoice (lunas = tercatat sebagai uang masuk) */
async function syncKasFromInvoice(inv){
  if(!inv || !inv.id) return;
  const kasId = 'auto-' + inv.id;
  if(inv.status === 'lunas'){
    const existing = await sGet('kas:'+kasId);
    const entry = {
      id: kasId,
      type: 'masuk',
      jumlah: Number(inv.harga)||0,
      tanggal: existing ? existing.tanggal : new Date().toISOString().slice(0,10),
      keterangan: `Pelunasan Invoice ${inv.id}${inv.booking && inv.booking.nama ? ' — '+inv.booking.nama : ''}`,
      sumber: 'invoice',
      invoiceId: inv.id,
      createdAt: existing ? existing.createdAt : Date.now()
    };
    await sSet('kas:'+kasId, entry);
  } else {
    await sDelete('kas:'+kasId);
  }
}

/* ---- Tab: Calendar ---- */
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();

async function renderCalendarTab(mount){
  mount.innerHTML = `<h2>Kalender Event</h2><p class="sub">Tanggal bertitik emas menandakan ada acara terjadwal.</p><div id="calArea">Memuat…</div>`;
  const bookings = await getAllBookings();
  drawCalendar(bookings);
}
function drawCalendar(bookings){
  const area = document.getElementById('calArea');
  const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const firstDay = new Date(calYear, calMonth, 1);
  const startOffset = (firstDay.getDay()+6)%7; // Senin=0
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const byDate = {};
  bookings.forEach(b=>{ (byDate[b.tanggal] = byDate[b.tanggal]||[]).push(b); });
  const todayStr = new Date().toISOString().slice(0,10);

  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="cal-cell"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = byDate[dateStr];
    cells += `<div class="cal-cell inmonth ${has?'has-event':''} ${dateStr===todayStr?'today':''}" ${has?`onclick="showDayEvents('${dateStr}')"`:''}>${d}${has?'<span class="dot"></span>':''}</div>`;
  }
  area.innerHTML = `
    <div class="cal-head">
      <button class="btn btn-ghost" style="padding:7px 12px;" onclick="calNav(-1)">←</button>
      <h3>${monthNames[calMonth]} ${calYear}</h3>
      <button class="btn btn-ghost" style="padding:7px 12px;" onclick="calNav(1)">→</button>
    </div>
    <div class="cal-grid">
      ${['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div id="dayEvents" style="margin-top:20px;"></div>
  `;
  window._calBookings = bookings;
}
function calNav(dir){
  calMonth += dir;
  if(calMonth<0){calMonth=11; calYear--;}
  if(calMonth>11){calMonth=0; calYear++;}
  drawCalendar(window._calBookings || []);
}
function showDayEvents(dateStr){
  const items = (window._calBookings||[]).filter(b=>b.tanggal===dateStr);
  document.getElementById('dayEvents').innerHTML = `
    <h3 style="font-size:15px; margin-bottom:10px;">Acara ${fmtDate(dateStr)}</h3>
    ${items.map(b=>`<div class="card" style="margin-bottom:8px; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;">
      <div><b>${b.nama}</b> — ${b.isiEvent ? b.isiEvent+' · ' : ''}${b.tempat}${b.jamEvent ? ' · Jam '+b.jamEvent : ''}<br><span style="color:var(--muted); font-size:13px;">WA: ${b.noWa||'-'} · ${b.catatan||'-'}</span></div>
      <div style="display:flex; gap:8px; flex-shrink:0;">
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px;" onclick="editBooking('${b.id}')">Edit</button>
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px;" onclick="armDelete(this,'booking','${b.id}')">Hapus</button>
      </div>
    </div>`).join('')}
  `;
}

  if(!q) return items;
  const s = q.toLowerCase();
  return items.filter(k => [k.keterangan, k.type==='masuk'?'masuk':'keluar', k.sumber==='invoice'?'invoice otomatis':'manual']
    .some(v => (v||'').toString().toLowerCase().includes(s)));
}
async function renderKeuanganTab(mount){
  mount.innerHTML = `<h2>Keuangan</h2><p class="sub">Catat uang masuk &amp; keluar. Invoice yang ditandai Lunas otomatis tercatat sebagai uang masuk.</p><div id="kasArea">Memuat…</div>`;
  const items = await getAllKas();
  const area = document.getElementById('kasArea');
  const editingKas = editingKasId ? items.find(k=>k.id===editingKasId) : null;

  const totalMasuk = items.filter(k=>k.type==='masuk').reduce((sum,k)=>sum+Number(k.jumlah||0),0);
  const totalKeluar = items.filter(k=>k.type==='keluar').reduce((sum,k)=>sum+Number(k.jumlah||0),0);
  const saldo = totalMasuk - totalKeluar;

  area.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card masuk"><div class="stat-label">Total Uang Masuk</div><div class="stat-value">${fmtIDR(totalMasuk)}</div></div>
      <div class="stat-card keluar"><div class="stat-label">Total Uang Keluar</div><div class="stat-value">${fmtIDR(totalKeluar)}</div></div>
      <div class="stat-card saldo"><div class="stat-label">Total Saldo</div><div class="stat-value">${fmtIDR(saldo)}</div></div>
    </div>
    <div class="card">
      <div class="form-grid">
        ${editingKas ? `<div class="eyebrow" style="color:var(--gold);">Mengedit transaksi</div>` : ''}
        <div class="row2">
          <div>
            <label>Jenis Transaksi</label>
            <select id="kas_type">
              <option value="masuk" ${editingKas && editingKas.type==='masuk' ? 'selected':''}>Uang Masuk</option>
              <option value="keluar" ${editingKas && editingKas.type==='keluar' ? 'selected':''}>Uang Keluar</option>
            </select>
          </div>
          <div>
            <label>Jumlah (Rp)</label>
            <input type="number" id="kas_jumlah" placeholder="Contoh: 200000" value="${editingKas ? editingKas.jumlah : ''}">
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Tanggal</label>
            <input type="date" id="kas_tanggal" value="${editingKas ? editingKas.tanggal : new Date().toISOString().slice(0,10)}">
          </div>
          <div>
            <label>Keterangan</label>
            <input type="text" id="kas_keterangan" placeholder="${editingKas ? (editingKas.type==='masuk' ? 'Contoh: DP Booking a.n. Budi' : 'Contoh: Beli baterai kamera') : 'Contoh: DP Booking a.n. Budi'}" value="${editingKas ? (editingKas.keterangan||'').replace(/"/g,'&quot;') : ''}">
          </div>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" id="createKasBtn">${editingKas ? 'Simpan Perubahan' : 'Tambah Transaksi'}</button>
          ${editingKas ? `<button class="btn btn-ghost" onclick="cancelEditKas()">Batal</button>` : ''}
        </div>
      </div>
    </div>
    <h3 style="margin:28px 0 14px; font-size:15px; color:var(--muted);">Riwayat Transaksi</h3>
    <div style="margin-bottom:14px;"><input type="text" id="kasSearchInput" placeholder="Cari keterangan, jenis, atau sumber…" value="${kasSearchQuery.replace(/"/g,'&quot;')}"></div>
    <div id="kasList">${items.length===0 ? `<div class="empty">Belum ada transaksi keuangan.</div>` : ''}</div>
  `;
  window._allKas = items;
  const kasTypeSelect = document.getElementById('kas_type');
  const kasKeteranganInput = document.getElementById('kas_keterangan');
  kasTypeSelect.addEventListener('change', ()=>{
    kasKeteranganInput.placeholder = kasTypeSelect.value==='masuk' ? 'Contoh: DP Booking a.n. Budi' : 'Contoh: Beli baterai kamera';
  });
  const kasSearchInput = document.getElementById('kasSearchInput');
  kasSearchInput.addEventListener('input', ()=>{
    kasSearchQuery = kasSearchInput.value;
    renderKasHistory(window._allKas, filterKas(window._allKas, kasSearchQuery));
  });
  document.getElementById('createKasBtn').addEventListener('click', async ()=>{
    const type = document.getElementById('kas_type').value;
    const jumlah = document.getElementById('kas_jumlah').value;
    const tanggal = document.getElementById('kas_tanggal').value;
    const keterangan = document.getElementById('kas_keterangan').value.trim();
    if(!jumlah || Number(jumlah)<=0 || !tanggal || !keterangan){ toast('Mohon lengkapi jumlah, tanggal, dan keterangan.'); return; }
    if(editingKas){
      const updated = Object.assign({}, editingKas, { type, jumlah: Number(jumlah), tanggal, keterangan });
      await sSet('kas:'+editingKas.id, updated);
      toast('Transaksi diperbarui.');
      editingKasId = null;
    } else {
      const id = 'M-' + uid();
      const entry = { id, type, jumlah: Number(jumlah), tanggal, keterangan, sumber: 'manual', createdAt: Date.now() };
      await sSet('kas:'+id, entry);
      toast('Transaksi berhasil ditambahkan.');
    }
    renderAdmin();
  });
  renderKasHistory(items, filterKas(items, kasSearchQuery));
}
function renderKasHistory(allItems, items){
  if(items === undefined) items = allItems;
  const listEl = document.getElementById('kasList');
  if(!listEl) return;
  if(allItems.length===0){ listEl.innerHTML = `<div class="empty">Belum ada transaksi keuangan.</div>`; return; }
  if(items.length===0){ listEl.innerHTML = `<div class="empty">Tidak ada transaksi yang cocok.</div>`; return; }
  const isAuto = k => k.sumber === 'invoice';
  listEl.innerHTML = items.map(k=>`
    <div class="card list-card" style="margin-bottom:10px;">
      <div>
        <span class="kas-badge ${k.type}">${k.type==='masuk' ? '↑ Masuk' : '↓ Keluar'}</span>${isAuto(k) ? `<span class="kas-badge auto">Otomatis · Invoice</span>` : ''}<br>
        <b style="display:inline-block; margin-top:6px;">${k.keterangan}</b><br>
        <span style="color:var(--muted); font-size:13px;">${fmtIDR(k.jumlah)} · ${fmtDate(k.tanggal)}</span>
      </div>
      <div class="action-row" style="flex-shrink:0;">
        ${isAuto(k) ? `<span class="sub" style="margin:0; font-size:12.5px;">Kelola dari tab Invoice</span>` : `
        <button class="btn btn-ghost" style="padding:8px 14px; font-size:12.5px;" onclick="editKas('${k.id}')">Edit</button>
        <button class="btn btn-ghost" style="padding:8px 14px; font-size:12.5px;" onclick="armDelete(this,'kas','${k.id}')">Hapus</button>
        `}
      </div>
    </div>
  `).join('');
}

/* ---- Rekening Pembayaran (CRUD) ---- */
let editingRekeningId = null;

function renderRekeningRow(r){
  return `
    <div class="card" style="margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; gap:12px; flex-wrap:wrap;">
      <div>
        <span class="tag">${r.bank}</span> <b style="margin-left:6px;">${r.noRek}</b>
        ${r.atasNama ? `<br><span style="color:var(--muted); font-size:12.5px;">a.n. ${r.atasNama}</span>` : ''}
      </div>
      <div style="display:flex; gap:8px; flex-shrink:0;">
        <button class="btn btn-ghost" style="padding:8px 14px; font-size:12.5px;" onclick='editRekeningStart(${JSON.stringify(r.id)})'>Edit</button>
        <button class="btn btn-ghost" style="padding:8px 14px; font-size:12.5px;" onclick='armDelete(this,"rekening", ${JSON.stringify(r.id)})'>Hapus</button>
      </div>
    </div>
  `;
}

function renderRekeningEditRow(r){
  return `
    <div class="card" style="margin-bottom:10px; padding:16px;">
      <div class="form-grid">
        <div class="row2">
          <div><label>Jenis Bank / E-Wallet</label><input type="text" id="rek_edit_bank" value="${r.bank}" placeholder="Contoh: BCA, Mandiri, Dana"></div>
          <div><label>Nomor Rekening</label><input type="text" id="rek_edit_norek" value="${r.noRek}" placeholder="Contoh: 1234567890"></div>
        </div>
        <div><label>Atas Nama (opsional)</label><input type="text" id="rek_edit_atasnama" value="${r.atasNama||''}" placeholder="Nama pemilik rekening"></div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-primary" onclick='saveRekeningEdit(${JSON.stringify(r.id)})'>Simpan</button>
          <button class="btn btn-ghost" onclick="cancelEditRekening()">Batal</button>
        </div>
      </div>
    </div>
  `;
}

function editRekeningStart(id){ editingRekeningId = id; renderAdmin(); }
function cancelEditRekening(){ editingRekeningId = null; renderAdmin(); }

function addRekening(){
  const bank = document.getElementById('rek_bank').value.trim();
  const noRek = document.getElementById('rek_norek').value.trim();
  const atasNama = document.getElementById('rek_atasnama').value.trim();
  if(!bank || !noRek){ toast('Isi jenis bank dan nomor rekening terlebih dahulu.'); return; }
  ADMIN_REKENING.push({ id: uid(), bank, noRek, atasNama });
  saveSettings();
  toast('Rekening berhasil ditambahkan.');
  renderAdmin();
}

function saveRekeningEdit(id){
  const bank = document.getElementById('rek_edit_bank').value.trim();
  const noRek = document.getElementById('rek_edit_norek').value.trim();
  const atasNama = document.getElementById('rek_edit_atasnama').value.trim();
  if(!bank || !noRek){ toast('Isi jenis bank dan nomor rekening terlebih dahulu.'); return; }
  const idx = ADMIN_REKENING.findIndex(r=>r.id===id);
  if(idx>-1){ ADMIN_REKENING[idx] = { id, bank, noRek, atasNama }; }
  saveSettings();
  editingRekeningId = null;
  toast('Rekening berhasil diperbarui.');
  renderAdmin();
}

function deleteRekening(id){
  ADMIN_REKENING = ADMIN_REKENING.filter(r=>r.id!==id);
  saveSettings();
  toast('Rekening dihapus.');
  renderAdmin();
}

  mount.innerHTML = `

      <h3 style="font-size:15px; margin-bottom:14px;">Nomor WhatsApp Admin</h3>
      <div class="form-grid">
        <div>
          <label>Nomor WhatsApp Admin (format: 62xxxxxxxxxx, tanpa spasi/simbol)</label>
          <input type="text" id="set_wa" value="${ADMIN_WA_NUMBER}" placeholder="6285226452935">
        </div>
        <div>
          <button class="btn btn-primary" onclick="saveAdminNumber()">Simpan Nomor Admin</button>
        </div>
      </div>
    </div>

      <h3 style="font-size:15px; margin-bottom:14px;">Rekening Pembayaran</h3>
      <p class="sub" style="margin-bottom:16px;">Kelola daftar rekening bank / e-wallet untuk pembayaran pelanggan. Bisa menambahkan beberapa rekening, dan akan otomatis tersedia untuk dipilih saat membuat invoice.</p>
      <div id="rekList">
        ${ADMIN_REKENING.length===0 ? `<div class="empty">Belum ada rekening ditambahkan.</div>` : ADMIN_REKENING.map(r=> editingRekeningId===r.id ? renderRekeningEditRow(r) : renderRekeningRow(r)).join('')}
      </div>

      <div class="form-grid">
        <div class="row2">
          <div><label>Jenis Bank / E-Wallet</label><input type="text" id="rek_bank" placeholder="Contoh: BCA, Mandiri, Dana, OVO"></div>
          <div><label>Nomor Rekening</label><input type="text" id="rek_norek" placeholder="Contoh: 1234567890"></div>
        </div>
        <div><label>Atas Nama (opsional)</label><input type="text" id="rek_atasnama" placeholder="Nama pemilik rekening"></div>
        <div><button class="btn btn-primary" onclick="addRekening()">Tambah Rekening</button></div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:15px; margin-bottom:14px;">Ubah Kata Sandi Admin</h3>
      <p class="sub" style="margin-bottom:16px;">Demi keamanan, perubahan kata sandi wajib dikonfirmasi dengan kode yang dikirim ke WhatsApp admin (${ADMIN_WA_NUMBER}).</p>
      <div class="form-grid">
        <div class="row2">
          <div><label>Kata Sandi Baru</label>
            <div class="pw-wrap">
              <input type="password" id="set_newpass" placeholder="Minimal 6 karakter">
              <button type="button" class="pw-toggle" onclick="togglePw('set_newpass', this)" aria-label="Tampilkan kata sandi">👁</button>
            </div>
          </div>

            <div class="pw-wrap">
              <input type="password" id="set_newpass2" placeholder="Ulangi kata sandi baru">
              <button type="button" class="pw-toggle" onclick="togglePw('set_newpass2', this)" aria-label="Tampilkan kata sandi">👁</button>
            </div>
          </div>
        </div>
        <div id="otpStep1">
          <button class="btn btn-primary" onclick="sendPasswordOtp()">Kirim Kode Konfirmasi ke WhatsApp</button>
        </div>
        <div id="otpStep2" style="display:none;">
          <label>Kode Konfirmasi (dikirim ke WhatsApp admin)</label>
          <input type="text" id="set_otp" placeholder="Masukkan 6 digit kode">
          <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="btn btn-primary" onclick="confirmPasswordOtp()">Konfirmasi &amp; Simpan</button>
            <button class="btn btn-ghost" onclick="cancelPasswordOtp()">Batal</button>
          </div>
        </div>
      </div>

}

function saveAdminNumber(){
  const raw = document.getElementById('set_wa').value.trim();
  const val = raw.replace(/[^0-9]/g,'');
  if(!val || val.length<8){ toast('Nomor WhatsApp tidak valid.'); return; }
  ADMIN_WA_NUMBER = val;
  saveSettings();
  toast('Nomor WhatsApp admin diperbarui.');
  renderAdmin();
}

function sendPasswordOtp(){
  const p1 = document.getElementById('set_newpass').value;
  const p2 = document.getElementById('set_newpass2').value;
  if(!p1 || p1.length<6){ toast('Kata sandi baru minimal 6 karakter.'); return; }
  if(p1 !== p2){ toast('Konfirmasi kata sandi baru tidak cocok.'); return; }
  const code = String(Math.floor(100000 + Math.random()*900000));
  pendingOtp = { code, newPassword: p1, expiresAt: Date.now() + 10*60*1000 };
  const text = encodeURIComponent(
    `*Konfirmasi Ganti Kata Sandi Admin — Gallery Pesona*\n\n`+
    `Kode konfirmasi Anda: ${code}\n\n`+
    `Masukkan kode ini di halaman Pengaturan admin untuk menyelesaikan perubahan kata sandi. Kode berlaku 10 menit. Abaikan pesan ini jika Anda tidak meminta perubahan.`
  );
  try{ window.open(`https://wa.me/${ADMIN_WA_NUMBER}?text=${text}`, '_blank'); }
  catch(e){ console.warn('window.open diblokir', e); }
  document.getElementById('otpStep1').style.display = 'none';
  document.getElementById('otpStep2').style.display = 'block';
  toast('Kode konfirmasi dikirim ke WhatsApp admin.');
}

function cancelPasswordOtp(){
  pendingOtp = null;
  renderAdmin();
}

function confirmPasswordOtp(){
  if(!pendingOtp){ toast('Tidak ada permintaan perubahan kata sandi yang aktif.'); return; }
  const code = document.getElementById('set_otp').value.trim();
  if(Date.now() > pendingOtp.expiresAt){ toast('Kode konfirmasi sudah kedaluwarsa. Silakan ulangi.'); pendingOtp=null; renderAdmin(); return; }
  if(code !== pendingOtp.code){ toast('Kode konfirmasi salah.'); return; }
  ADMIN_PASSWORD = pendingOtp.newPassword;
  saveSettings();
  pendingOtp = null;
  toast('Kata sandi admin berhasil diperbarui.');
  renderAdmin();
}

function printInvoice(){
  const html = document.getElementById('printArea').outerHTML;
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>Invoice</title><style>body{font-family:Inter,sans-serif; margin:0;} img{max-width:100%;} table{width:100%;border-collapse:collapse;} td,th{padding:8px; border-bottom:1px solid #eee;}</style></head><body>${html}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(), 300);
}
